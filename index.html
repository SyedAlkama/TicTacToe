<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Bootstrap fies -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <!-- CSS file-->
    <link href="style.css" rel="stylesheet">
</head>

<body>
    <div class="container-fluid">
        <div class=" d-flex align-items-center justify-content-center vh-100">
            <div style="min-height: 80vh;min-width: 75vh; background-color:  #384251;"
                class="rounded shadow opacity-50">
                <div class="row d-flex justify-content-center">
                    <div class="col-6 d-flex justify-content-center">
                        <h1 class="text-light">Tic-Tac-Toe</h1>
                    </div>
                </div>
                <!-- Added d-flex and flex-column to make the main container a vertical flexbox -->
                <div class=" d-flex align-items-center justify-content-center">
                    <div class="ratio ratio-1x1 w-100" style="max-width: 350px;">
                        <div class="d-flex flex-column" style="min-height: 50vh;">

                            <!-- Each row gets 'flex-fill' or 'flex-grow-1' to divide the 60vh space equally -->
                            <div class="row g-0 flex-grow-1 border-bottom border-dark border-2">
                                <div class="row g-0 flex-grow-1 border-bottom border-dark border-2">
                                    <button
                                        class="col-4 btn btn-light rounded-0 fs-1 fw-bold border-end border-dark border-2 d-flex align-items-center justify-content-center">X</button>
                                    <button
                                        class="col-4 btn btn-light rounded-0 fs-1 fw-bold border-end border-dark border-2 d-flex align-items-center justify-content-center">O</button>
                                    <button
                                        class="col-4 btn btn-light rounded-0 fs-1 fw-bold border-end border-dark border-2 d-flex align-items-center justify-content-center"></button>
                                </div>

                                <!-- Row 2 -->
                                <div class="row g-0 flex-grow-1 border-bottom border-dark border-2">
                                    <button
                                        class="col-4 btn btn-light rounded-0 fs-1 fw-bold border-end border-dark border-2 d-flex align-items-center justify-content-center"></button>
                                    <button
                                        class="col-4 btn btn-light rounded-0 fs-1 fw-bold border-end border-dark border-2 d-flex align-items-center justify-content-center">X</button>
                                    <button
                                        class="col-4 btn btn-light rounded-0 fs-1 fw-bold border-end border-dark border-2 d-flex align-items-center justify-content-center"></button>
                                </div>

                                <!-- Row 3 -->
                                <div class="row g-0 flex-grow-1 border-bottom border-dark border-2">
                                    <button
                                        class="col-4 btn btn-light rounded-0 fs-1 fw-bold border-end border-dark border-2 d-flex align-items-center justify-content-center"></button>
                                    <button
                                        class="col-4 btn btn-light rounded-0 fs-1 fw-bold border-end border-dark border-2 d-flex align-items-center justify-content-center"></button>
                                    <button
                                        class="col-4 btn btn-light rounded-0 fs-1 fw-bold border-end border-dark border-2 d-flex align-items-center justify-content-center">O</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row d-flex justify-content-center">
                    <div class="col-6 d-flex justify-content-center">
                        <h3 class="text-light">X Turn !</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
